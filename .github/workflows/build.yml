name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    name: Rust workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build
        run: cargo build --workspace --locked

      - name: Test
        run: cargo test --workspace --locked
